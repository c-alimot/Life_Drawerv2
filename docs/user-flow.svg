<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2200" viewBox="0 0 1800 2200">
  <defs>
    <style>
      .title { font: 700 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2F2924; }
      .section { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #556950; }
      .box { fill: #FFFFFF; stroke: #8C9A7F; stroke-width: 3; rx: 24; ry: 24; }
      .text { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2F2924; }
      .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6F6860; }
      .line { stroke: #8C9A7F; stroke-width: 4; fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8C9A7F" />
    </marker>
  </defs>

  <rect width="1800" height="2200" fill="#EDEAE4" />
  <text x="900" y="90" text-anchor="middle" class="title">Life Drawer - User Flow</text>

  <!-- Auth flow -->
  <text x="140" y="160" class="section">Onboarding + Authentication</text>
  <rect x="120" y="190" width="300" height="95" class="box"/>
  <text x="270" y="245" text-anchor="middle" class="text">App Launch</text>
  <rect x="500" y="190" width="300" height="95" class="box"/>
  <text x="650" y="245" text-anchor="middle" class="text">Onboarding</text>
  <rect x="880" y="190" width="300" height="95" class="box"/>
  <text x="1030" y="245" text-anchor="middle" class="text">Intro</text>
  <rect x="1260" y="190" width="300" height="95" class="box"/>
  <text x="1410" y="245" text-anchor="middle" class="text">Login / Signup</text>
  <line x1="420" y1="238" x2="500" y2="238" class="line" marker-end="url(#arrow)"/>
  <line x1="800" y1="238" x2="880" y2="238" class="line" marker-end="url(#arrow)"/>
  <line x1="1180" y1="238" x2="1260" y2="238" class="line" marker-end="url(#arrow)"/>

  <!-- Home hub -->
  <text x="140" y="380" class="section">Main App Hub</text>
  <rect x="670" y="420" width="460" height="110" class="box"/>
  <text x="900" y="480" text-anchor="middle" class="text">Home Screen (Recent Entries + Drawers)</text>
  <line x1="1410" y1="285" x2="1410" y2="420" class="line"/>
  <line x1="1410" y1="420" x2="1130" y2="475" class="line" marker-end="url(#arrow)"/>

  <!-- Main branches -->
  <rect x="120" y="650" width="300" height="95" class="box"/>
  <text x="270" y="705" text-anchor="middle" class="text">Search</text>
  <rect x="500" y="650" width="300" height="95" class="box"/>
  <text x="650" y="705" text-anchor="middle" class="text">Life Phases</text>
  <rect x="880" y="650" width="300" height="95" class="box"/>
  <text x="1030" y="705" text-anchor="middle" class="text">Create Entry</text>
  <rect x="1260" y="650" width="300" height="95" class="box"/>
  <text x="1410" y="705" text-anchor="middle" class="text">Settings</text>

  <line x1="900" y1="530" x2="270" y2="650" class="line" marker-end="url(#arrow)"/>
  <line x1="900" y1="530" x2="650" y2="650" class="line" marker-end="url(#arrow)"/>
  <line x1="900" y1="530" x2="1030" y2="650" class="line" marker-end="url(#arrow)"/>
  <line x1="900" y1="530" x2="1410" y2="650" class="line" marker-end="url(#arrow)"/>

  <!-- Create entry details -->
  <text x="140" y="860" class="section">Create / Edit Entry Flow</text>
  <rect x="120" y="900" width="560" height="145" class="box"/>
  <text x="400" y="950" text-anchor="middle" class="text">Compose Entry</text>
  <text x="400" y="985" text-anchor="middle" class="small">Title + Content + Mood + Tags + Drawers + Location</text>
  <text x="400" y="1015" text-anchor="middle" class="small">Image preview + Audio memo preview + Linked chips</text>

  <rect x="760" y="900" width="460" height="145" class="box"/>
  <text x="990" y="950" text-anchor="middle" class="text">Save Entry</text>
  <text x="990" y="985" text-anchor="middle" class="small">Uploads media to private storage</text>
  <text x="990" y="1015" text-anchor="middle" class="small">Persists entry + relations</text>

  <rect x="1300" y="900" width="360" height="145" class="box"/>
  <text x="1480" y="950" text-anchor="middle" class="text">Home Refresh</text>
  <text x="1480" y="985" text-anchor="middle" class="small">Recent entry list updates</text>

  <line x1="680" y1="972" x2="760" y2="972" class="line" marker-end="url(#arrow)"/>
  <line x1="1220" y1="972" x2="1300" y2="972" class="line" marker-end="url(#arrow)"/>

  <!-- Existing entry -->
  <rect x="120" y="1130" width="560" height="145" class="box"/>
  <text x="400" y="1180" text-anchor="middle" class="text">Open Existing Entry</text>
  <text x="400" y="1215" text-anchor="middle" class="small">Tap recent card OR 3-dot - Edit</text>
  <text x="400" y="1245" text-anchor="middle" class="small">Both routes open same Edit Entry page</text>

  <rect x="760" y="1130" width="460" height="145" class="box"/>
  <text x="990" y="1180" text-anchor="middle" class="text">Edit + Confirm Actions</text>
  <text x="990" y="1215" text-anchor="middle" class="small">Delete image confirmation modal</text>
  <text x="990" y="1245" text-anchor="middle" class="small">Entry delete confirmation modal</text>

  <line x1="680" y1="1202" x2="760" y2="1202" class="line" marker-end="url(#arrow)"/>

  <!-- Other features -->
  <text x="140" y="1410" class="section">Other Core Areas</text>
  <rect x="120" y="1450" width="360" height="125" class="box"/>
  <text x="300" y="1510" text-anchor="middle" class="text">Drawers</text>
  <text x="300" y="1540" text-anchor="middle" class="small">Create/manage + open drawer detail</text>

  <rect x="560" y="1450" width="360" height="125" class="box"/>
  <text x="740" y="1510" text-anchor="middle" class="text">Tags</text>
  <text x="740" y="1540" text-anchor="middle" class="small">Create/manage + tag-based grouping</text>

  <rect x="1000" y="1450" width="360" height="125" class="box"/>
  <text x="1180" y="1510" text-anchor="middle" class="text">Life Phases</text>
  <text x="1180" y="1540" text-anchor="middle" class="small">Create + set active + edit current via popup</text>

  <rect x="1440" y="1450" width="220" height="125" class="box"/>
  <text x="1550" y="1510" text-anchor="middle" class="text">Settings</text>
  <text x="1550" y="1540" text-anchor="middle" class="small">Account/actions</text>

  <!-- Footer notes -->
  <text x="900" y="1710" text-anchor="middle" class="section">Data/UX Rules Currently in App</text>
  <rect x="220" y="1740" width="1360" height="220" class="box"/>
  <text x="260" y="1790" class="text">- Entry media is private storage + signed URL based</text>
  <text x="260" y="1840" class="text">- Image attachments are entry-scoped (no auto-sharing across entries)</text>
  <text x="260" y="1890" class="text">- Recent entry chips show drawers + tags preview</text>
  <text x="260" y="1940" class="text">- Location display targets city/state-style naming (no coordinate fallback in entry UI)</text>
</svg>
